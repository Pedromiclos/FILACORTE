<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FilaCorte - Assinatura do Barbeiro</title>
  <style>
    :root {
      --bg-dark: #0a0a0a;
      --card-bg: #121214;
      --border-color: #26262a;
      --primary-purple: #820ad1;
      --primary-purple-hover: #6d08b1;
      --accent-gold: #eab308;
      --text-muted: #a1a1aa;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 40px;
    }

    /* Top Bar */
    header {
      width: 100%;
      max-width: 650px;
      margin: 25px auto 10px auto;
      padding: 0 15px;
    }

    .nav-container {
      background-color: #141416;
      border: 1px solid #242428;
      border-radius: 40px;
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 10px;
      padding-left: 8px;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      background-color: var(--accent-gold);
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(234, 179, 8, 0.6);
    }

    nav {
      display: flex;
      gap: 4px;
      background-color: #1e1e24;
      padding: 4px;
      border-radius: 30px;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 20px;
      transition: all 0.2s ease;
    }

    nav a.active {
      background-color: #d97706;
      color: #000000;
      font-weight: 700;
    }

    nav a:hover:not(.active) {
      color: #ffffff;
    }

    /* Main Container */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding: 15px;
    }

    .card-container {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 32px 28px;
      max-width: 430px;
      width: 100%;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.7);
      text-align: center;
    }

    .brand-title {
      font-size: 28px;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }

    .plano-badge {
      display: inline-block;
      background-color: rgba(130, 10, 209, 0.15);
      color: #c084fc;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 16px;
      border: 1px solid var(--primary-purple);
    }

    .subtexto {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 22px;
    }

    /* Caixa Pix */
    .pix-box {
      background-color: #ffffff;
      color: #111111;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 22px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .pix-box p {
      color: #27272a;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .chave-pix {
      font-size: 22px;
      font-weight: 800;
      color: var(--primary-purple);
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .btn-copiar {
      background-color: var(--primary-purple);
      color: #ffffff;
      border: none;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      width: 100%;
      font-size: 14px;
      transition: all 0.2s;
    }

    .btn-copiar:hover {
      background-color: var(--primary-purple-hover);
    }

    /* Forms */
    .form-group {
      margin-bottom: 16px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 13px;
      color: #d4d4d8;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      background-color: #1a1a1e;
      border: 1px solid #3f3f46;
      border-radius: 8px;
      color: #ffffff;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--primary-purple);
    }

    .btn-pagar {
      background-color: var(--primary-purple);
      color: #ffffff;
      border: none;
      padding: 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      width: 100%;
      font-size: 16px;
      margin-top: 8px;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(130, 10, 209, 0.3);
    }

    .btn-pagar:hover {
      background-color: var(--primary-purple-hover);
    }

    .btn-pagar:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #status-mensagem {
      margin-top: 20px;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.5;
    }

    .link-gerado-box {
      margin-top: 15px;
      background: #182232;
      border: 1px solid #3b82f6;
      padding: 14px;
      border-radius: 8px;
      word-break: break-all;
      text-align: center;
    }

    .link-gerado-box a {
      color: #60a5fa;
      font-weight: bold;
      text-decoration: underline;
      display: block;
      margin-top: 6px;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <header>
    <div class="nav-container">
      <div class="logo">
        <span class="logo-dot"></span> FilaCorte
      </div>
      <nav>
        <a href="#" class="active">Área do Cliente</a>
        <a href="#">Painel Barbeiro</a>
        <a href="#">Painel Admin</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="card-container">
      <h1 class="brand-title">FilaCorte</h1>
      <div class="plano-badge">Plano Mensal Barbeiro - R$ 29,90/mês</div>

      <p class="subtexto">
        Assine para criar sua fila virtual. Os seus clientes acessarão a fila de graça pelo link que você compartilhar!
      </p>

      <div class="pix-box">
        <p>Chave Pix (Nubank):</p>
        <div class="chave-pix" id="chave-pix">77981593498</div>
        <button class="btn-copiar" id="btn-copiar" onclick="copiarChave()">Copiar Chave Pix</button>
      </div>

      <div class="form-group">
        <label for="nomeBarbearia">Nome da sua Barbearia:</label>
        <input type="text" id="nomeBarbearia" placeholder="Ex: Barbearia do Silva">
      </div>

      <div class="form-group">
        <label for="email">Seu E-mail de cadastro:</label>
        <input type="email" id="email" placeholder="seuemail@exemplo.com" required>
      </div>

      <button class="btn-pagar" id="btn-confirmar" onclick="confirmarPagamento()">Já fiz o pagamento</button>

      <div id="status-mensagem"></div>
    </div>
  </main>

  <script>
    const CHAVE_PIX = "77981593498";
    let statusInterval = null;

    function copiarChave() {
      navigator.clipboard.writeText(CHAVE_PIX);
      const btn = document.getElementById('btn-copiar');
      btn.innerText = "✓ Copiado!";
      btn.style.backgroundColor = "#10b981";
      setTimeout(() => {
        btn.innerText = "Copiar Chave Pix";
        btn.style.backgroundColor = "#820ad1";
      }, 2500);
    }

    async function confirmarPagamento() {
      const email = document.getElementById('email').value.trim();
      const nomeBarbearia = document.getElementById('nomeBarbearia').value.trim();
      const msgDiv = document.getElementById('status-mensagem');
      const btn = document.getElementById('btn-confirmar');

      if (!email || !email.includes('@')) {
        alert("Por favor, digite um e-mail válido.");
        return;
      }

      btn.disabled = true;
      btn.innerText = "Aguardando confirmação...";

      try {
        const response = await fetch('/enviar-comprovante', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, nomeBarbearia })
        });

        const data = await response.json();
        
        if (response.ok) {
          msgDiv.style.color = "#f59e0b"; // Amarelo
          msgDiv.innerText = data.mensagem;
          iniciarVerificacao(email);
        } else {
          alert(data.error || "Erro ao enviar a solicitação.");
          btn.disabled = false;
          btn.innerText = "Já fiz o pagamento";
        }

      } catch (error) {
        alert("Erro de conexão com o servidor.");
        btn.disabled = false;
        btn.innerText = "Já fiz o pagamento";
      }
    }

    function iniciarVerificacao(email) {
      if (statusInterval) clearInterval(statusInterval);

      statusInterval = setInterval(async () => {
        try {
          const res = await fetch(`/status-acesso/${encodeURIComponent(email)}`);
          const data = await res.json();

          if (data.status === 'ativo') {
            clearInterval(statusInterval);
            const msgDiv = document.getElementById('status-mensagem');
            msgDiv.style.color = "#10b981"; // Verde
            msgDiv.innerHTML = `
              🎉 Pagamento Confirmado!<br>Seu plano está ativo.
              <div class="link-gerado-box">
                <small style="color:#aaa;">Link exclusivo da sua fila:</small><br>
                <a href="${data.linkFila}" target="_blank">${data.linkFila}</a>
              </div>
            `;
          }
        } catch (e) {
          console.error("Verificando status...");
        }
      }, 3500);
    }
  </script>
</body>
</html>
